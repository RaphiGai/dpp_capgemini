name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cap-build-test:
    name: CAP backend build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Lint
        run: npm run lint --if-present

      - name: Build CDS
        run: npx cds build --production

      - name: Run tests
        run: npm test
        env:
          BLOCKCHAIN_ENABLED: 'false'
          QR_TOKEN_HMAC_SECRET: 'ci-test-secret-not-for-production-use'

  hardhat-test:
    name: Smart-contract test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: blockchain
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Hardhat deps
        run: npm install

      - name: Compile contracts
        run: npx hardhat compile

      - name: Run contract tests
        run: npx hardhat test
