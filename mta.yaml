_schema-version: '3.3'
ID: dpp-capgemini
version: 0.1.0
description: Digital Product Passport backend for the fashion industry
parameters:
  enable-parallel-deployments: true

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci || npm install
        - npm run build

modules:
  # ---- CAP service runtime ----
  - name: dpp-srv
    type: nodejs
    path: gen/srv
    parameters:
      instances: 1
      memory: 512M
      disk-quota: 1024M
      buildpack: nodejs_buildpack
    build-parameters:
      builder: npm-ci
    # Runtime secrets (QR_TOKEN_HMAC_SECRET, SESSION_SECRET, PUBLIC_BASE_URL) are
    # not stored in the descriptor. They come from the bound service `dpp-secrets`
    # and are projected into process.env by srv/lib/secrets.js on boot. See README
    # for the one-time `cf cups dpp-secrets …` setup.
    requires:
      - name: dpp-db
      - name: dpp-uaa
      - name: dpp-secrets
    provides:
      - name: srv-api          # consumed by approuter via destinations
        properties:
          srv-url: ${default-url}

  # ---- HDI table deployer (creates HANA schema from CDS) ----
  - name: dpp-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
      disk-quota: 512M
    properties:
      # Drop HANA objects that are no longer part of the model (e.g. the removed
      # BatchComponents per-(batch,bom) unique index) so schema migrations apply cleanly.
      HDI_DEPLOY_OPTIONS: '{"auto_undeploy":true}'
    requires:
      - name: dpp-db

  # ---- Approuter (public entrypoint, terminates auth) ----
  - name: dpp-approuter
    type: approuter.nodejs
    path: app/router
    parameters:
      keep-existing-routes: true
      memory: 256M
      disk-quota: 512M
    requires:
      - name: srv-api
        group: destinations
        properties:
          name: srv-api        # must match the destination name in xs-app.json
          url: ~{srv-url}
          forwardAuthToken: true
      - name: dpp-uaa
    provides:
      - name: app-api
        properties:
          app-protocol: ${protocol}
          app-uri: ${default-uri}

resources:
  - name: dpp-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared

  - name: dpp-uaa
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: dpp-capgemini-${space}
        tenant-mode: dedicated

  # Pre-created user-provided service holding runtime secrets.
  # SESSION_SECRET signs the app-managed login session cookie (own auth) — 32+ char random.
  # MAIL_* drive the self-service password-reset email (e.g. Mailjet SMTP). MAIL_USER/
  # MAIL_PASSWORD = the Mailjet API key / secret key; MAIL_FROM = a Mailjet-validated sender.
  # Create once per space before `cf deploy` (single JSON object — uups replaces it whole):
  #   cf cups dpp-secrets -p '{"QR_TOKEN_HMAC_SECRET":"<32+ char random>","SESSION_SECRET":"<32+ char random>","PUBLIC_BASE_URL":"https://<approuter-host>","MAIL_HOST":"in-v3.mailjet.com","MAIL_PORT":"587","MAIL_SECURE":"false","MAIL_USER":"<mailjet api key>","MAIL_PASSWORD":"<mailjet secret key>","MAIL_FROM":"<validated sender>"}'
  # Rotate without redeploying (rotating SESSION_SECRET invalidates all active sessions):
  #   cf uups dpp-secrets -p '{...all keys...}' && cf restart dpp-srv
  - name: dpp-secrets
    type: org.cloudfoundry.existing-service
    parameters:
      service-name: dpp-secrets
